name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Checkout suistody-core (local dependency)
        uses: actions/checkout@v4
        with:
          repository: ARZER-TW/suistody-core
          path: ../suistody-core

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Build suistody-core
        run: |
          cd ../suistody-core
          npm ci
          npm run build

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
